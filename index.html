    <script>
    // ============ Platform Data ============
    const platforms = {
        taobao: { name: '淘宝/天猫', icon: '🛒', sizes: { '主图': { width: 800, height: 800 }, '详情页': { width: 790, height: 0 }, '店铺头图': { width: 1920, height: 600 } } },
        jd: { name: '京东', icon: '🏬', sizes: { '主图': { width: 800, height: 800 }, '详情页': { width: 990, height: 0 }, '轮播图': { width: 1000, height: 400 } } },
        pdd: { name: '拼多多', icon: '🏷️', sizes: { '主图': { width: 750, height: 750 }, '详情页': { width: 750, height: 0 }, '轮播图': { width: 750, height: 352 } } },
        xiaohongshu: { name: '小红书', icon: '📕', sizes: { '封面图 3:4': { width: 1080, height: 1440 }, '正方形 1:1': { width: 1080, height: 1080 }, '横版 4:3': { width: 1080, height: 810 } } },
        douyin: { name: '抖音', icon: '🎵', sizes: { '视频封面 9:16': { width: 1080, height: 1920 }, '商品主图': { width: 800, height: 800 } } },
        wechat: { name: '微信公众号', icon: '💬', sizes: { '封面大图 2.35:1': { width: 900, height: 383 }, '封面小图': { width: 200, height: 200 }, '正文图片': { width: 1080, height: 0 } } },
    };

    // ============ State ============
    let state = {
        mode: 'cover',
        images: [],
        currentPlatform: null,
        currentSizeKey: null,
        waitingForPlatform: false,
        waitingForCustomSize: false,
    };

    const chatMessages = document.getElementById('chatMessages');
    const chatArea = document.getElementById('chatArea');

    // ============ Init ============
    function init() {
        setupDropZone();
        addBotMessage(`你好！我是图片尺寸助手 📐\n\n上传一张图片，我帮你适配各平台的尺寸要求。支持淘宝、天猫、京东、拼多多、小红书、抖音等。`);
    }

    // ============ Chat Helpers ============
    function scrollToBottom() {
        requestAnimationFrame(() => { chatArea.scrollTop = chatArea.scrollHeight; });
    }

    function addUserMessage(html) {
        const div = document.createElement('div');
        div.className = 'flex justify-end fade-in';
        div.innerHTML = `<div class="max-w-[80%] bg-primary text-white rounded-2xl rounded-br-md px-4 py-2.5 text-sm shadow-sm border border-orange-400/30">${html}</div>`;
        chatMessages.appendChild(div);
        scrollToBottom();
    }

    function addBotMessage(text) {
        const div = document.createElement('div');
        div.className = 'flex justify-start fade-in';
        const formattedText = text.replace(/\n/g, '<br>');
        div.innerHTML = `
            <div class="flex gap-2 max-w-[85%]">
                <div class="w-7 h-7 bg-gradient-to-br from-primary to-primary-dark rounded-full flex items-center justify-center flex-shrink-0 mt-0.5 shadow">
                    <svg class="w-3.5 h-3.5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01"/></svg>
                </div>
                <div class="bg-white rounded-2xl rounded-bl-md px-4 py-2.5 text-sm text-gray-700 shadow-sm border border-gray-200">${formattedText}</div>
            </div>`;
        chatMessages.appendChild(div);
        scrollToBottom();
        return div;
    }

    function addBotHTML(html) {
        const div = document.createElement('div');
        div.className = 'flex justify-start fade-in';
        div.innerHTML = `
            <div class="flex gap-2 max-w-[90%]">
                <div class="w-7 h-7 bg-gradient-to-br from-primary to-primary-dark rounded-full flex items-center justify-center flex-shrink-0 mt-0.5 shadow">
                    <svg class="w-3.5 h-3.5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01"/></svg>
                </div>
                <div class="bg-white rounded-2xl rounded-bl-md px-4 py-3 text-sm text-gray-700 shadow-sm border border-gray-200">${html}</div>
            </div>`;
        chatMessages.appendChild(div);
        scrollToBottom();
        return div;
    }

    function addTypingIndicator() {
        const div = document.createElement('div');
        div.className = 'flex justify-start fade-in';
        div.id = 'typingIndicator';
        div.innerHTML = `
            <div class="flex gap-2">
                <div class="w-7 h-7 bg-gradient-to-br from-primary to-primary-dark rounded-full flex items-center justify-center flex-shrink-0 mt-0.5 shadow">
                    <svg class="w-3.5 h-3.5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01"/></svg>
                </div>
                <div class="bg-white rounded-2xl rounded-bl-md px-4 py-3 shadow-sm border border-gray-200">
                    <div class="typing-dots flex gap-1">
                        <span class="w-2 h-2 bg-gray-400 rounded-full"></span>
                        <span class="w-2 h-2 bg-gray-400 rounded-full"></span>
                        <span class="w-2 h-2 bg-gray-400 rounded-full"></span>
                    </div>
                </div>
            </div>`;
        chatMessages.appendChild(div);
        scrollToBottom();
    }

    function removeTypingIndicator() {
        const el = document.getElementById('typingIndicator');
        if (el) el.remove();
    }

    // ============ Drop Zone ============
    function setupDropZone() {
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');

        dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', e => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });
        fileInput.addEventListener('change', e => {
            handleFiles(e.target.files);
            fileInput.value = '';
        });
    }

    // ============ File Handling ============
    function handleFiles(fileList) {
        const files = Array.from(fileList).filter(f => f.type.startsWith('image/'));
        if (files.length === 0) return;

        // Clear previous
        state.images.forEach(item => { if (item.resultUrl) URL.revokeObjectURL(item.resultUrl); });
        state.images = [];
        state.currentPlatform = null;
        state.currentSizeKey = null;
        state.waitingForPlatform = false;
        state.waitingForCustomSize = false;

        let loaded = 0;
        files.forEach(file => {
            const reader = new FileReader();
            reader.onload = e => {
                const img = new Image();
                img.onload = () => {
                    state.images.push({ file, img, name: file.name, resultBlob: null, resultUrl: null });
                    loaded++;
                    if (loaded === files.length) {
                        onImagesLoaded(files.length);
                    }
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        });
    }

    function onImagesLoaded(count) {
        // Show user message with thumbnail
        const first = state.images[0];
        let thumbHtml = '';
        if (count === 1) {
            const maxW = 120;
            const scale = Math.min(maxW / first.img.width, maxW / first.img.height, 1);
            const tw = Math.round(first.img.width * scale);
            const th = Math.round(first.img.height * scale);
            thumbHtml = `<img src="${first.img.src}" style="max-width:${tw}px;max-height:${th}px;border-radius:8px;" class="mb-1">`;
        } else {
            thumbHtml = `<div class="grid grid-cols-4 gap-1 mb-1">`;
            state.images.slice(0, 4).forEach(item => {
                thumbHtml += `<img src="${item.img.src}" class="w-14 h-14 object-cover rounded-lg">`;
            });
            if (count > 4) thumbHtml += `<div class="w-14 h-14 bg-white/20 rounded-lg flex items-center justify-center text-xs font-bold">+${count-4}</div>`;
            thumbHtml += `</div>`;
        }
        const sizeInfo = count === 1 ? `${first.img.width} × ${first.img.height} · ${formatBytes(first.file.size)}` : `共 ${count} 张图片`;
        addUserMessage(`${thumbHtml}<div class="text-xs opacity-80 mt-1">${sizeInfo}</div>`);

        // Show mode bar
        document.getElementById('modeBar').classList.remove('hidden');

        // Show platform selection after short delay
        setTimeout(() => {
            showPlatformSelection();
        }, 300);
    }

    function showPlatformSelection() {
        addTypingIndicator();
        setTimeout(() => {
            removeTypingIndicator();
            let html = '<div class="mb-2 text-gray-500">请选择目标平台和尺寸 👇</div>';
            html += '<div class="space-y-2">';
            Object.entries(platforms).forEach(([key, p]) => {
                const sizeNames = Object.entries(p.sizes).map(([name, s]) => `${name} ${s.width}×${s.height || '自适应'}`).join(' · ');
                html += `<div class="mb-1">
                    <div class="flex items-center gap-2 mb-1.5">
                        <span class="text-base">${p.icon}</span>
                        <span class="text-sm font-semibold text-gray-800">${p.name}</span>
                    </div>
                    <div class="flex flex-wrap gap-1.5 ml-7">`;
                Object.entries(p.sizes).forEach(([name, s]) => {
                    const label = s.height === 0 ? `${name} ${s.width}×自适应` : `${name} ${s.width}×${s.height}`;
                    html += `<button onclick="selectPlatform('${key}','${name}')" class="platform-btn text-xs px-3 py-1.5 rounded-full border border-gray-200 bg-white text-gray-700 font-medium hover:border-primary hover:text-primary hover:bg-orange-50">${label}</button>`;
                });
                html += `</div></div>`;
            });
            // Custom size
            html += `<div class="mt-3 pt-3 border-t border-gray-100">
                <div class="flex items-center gap-2 mb-1.5">
                    <span class="text-base">⚙️</span>
                    <span class="text-sm font-semibold text-gray-800">自定义尺寸</span>
                </div>
                <div class="ml-7 flex items-center gap-2">
                    <input type="number" id="customW" placeholder="宽" min="1" max="10000" value="800" class="w-20 px-2 py-1.5 border border-gray-200 rounded-lg text-xs text-center focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary">
                    <span class="text-gray-400 text-xs">×</span>
                    <input type="number" id="customH" placeholder="高" min="1" max="10000" value="800" class="w-20 px-2 py-1.5 border border-gray-200 rounded-lg text-xs text-center focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary">
                    <span class="text-gray-400 text-xs">px</span>
                    <button onclick="selectCustom()" class="platform-btn text-xs px-3 py-1.5 rounded-full border border-primary text-primary bg-orange-50 font-medium hover:bg-primary hover:text-white">确定</button>
                </div>
            </div>`;
            html += '</div>';
            addBotHTML(html);
        }, 400);
    }

    function selectPlatform(platformKey, sizeName) {
        const p = platforms[platformKey];
        const s = p.sizes[sizeName];
        state.currentPlatform = platformKey;
        state.currentSizeKey = sizeName;

        // User message
        addUserMessage(`${p.icon} ${p.name} · ${sizeName} · ${s.width}×${s.height || '自适应'} px`);

        // Process
        setTimeout(() => {
            processAndShowResult(s.width, s.height);
        }, 300);
    }

    function selectCustom() {
        const w = parseInt(document.getElementById('customW').value) || 800;
        const h = parseInt(document.getElementById('customH').value) || 800;
        addUserMessage(`⚙️ 自定义尺寸 ${w} × ${h} px`);
        setTimeout(() => {
            processAndShowResult(w, h);
        }, 300);
    }

    // ============ Image Processing ============
    function resizeImage(img, targetWidth, targetHeight, mode) {
        const canvas = document.createElement('canvas');
        canvas.width = targetWidth;
        canvas.height = targetHeight;
        const ctx = canvas.getContext('2d');

        if (mode === 'cover') {
            const scale = Math.max(targetWidth / img.width, targetHeight / img.height);
            const sw = targetWidth / scale;
            const sh = targetHeight / scale;
            const sx = (img.width - sw) / 2;
            const sy = (img.height - sh) / 2;
            ctx.drawImage(img, sx, sy, sw, sh, 0, 0, targetWidth, targetHeight);
        } else if (mode === 'contain') {
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, targetWidth, targetHeight);
            const scale = Math.min(targetWidth / img.width, targetHeight / img.height);
            const dw = img.width * scale;
            const dh = img.height * scale;
            const dx = (targetWidth - dw) / 2;
            const dy = (targetHeight - dh) / 2;
            ctx.drawImage(img, dx, dy, dw, dh);
        } else {
            ctx.drawImage(img, 0, 0, targetWidth, targetHeight);
        }
        return canvas;
    }

    async function processAndShowResult(targetW, targetH) {
        addTypingIndicator();
        await new Promise(r => setTimeout(r, 200));

        const results = [];
        for (const item of state.images) {
            let tw = targetW;
            let th = targetH;
            if (th === 0 && tw > 0) th = Math.round(item.img.height * (tw / item.img.width));
            if (tw === 0 && th > 0) tw = Math.round(item.img.width * (th / item.img.height));

            const canvas = resizeImage(item.img, tw, th, state.mode);
            const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.95));
            if (item.resultUrl) URL.revokeObjectURL(item.resultUrl);
            item.resultBlob = blob;
            item.resultUrl = URL.createObjectURL(blob);
            results.push({ item, tw, th, blob });
        }

        removeTypingIndicator();

        // Build result message
        let html = `<div class="text-gray-500 mb-2">处理完成！✅ 共 ${results.length} 张</div>`;
        html += `<div class="grid grid-cols-2 gap-2 mb-3">`;
        results.forEach(({ item, tw, th, blob }, idx) => {
            const globalIdx = state.images.indexOf(item);
            const baseName = item.name.replace(/\.[^.]+$/, '');
            html += `
                <div class="result-card bg-gray-50 rounded-xl overflow-hidden border border-gray-100">
                    <div class="aspect-square flex items-center justify-center p-2 bg-white">
                        <img src="${item.resultUrl}" class="max-w-full max-h-full object-contain rounded" alt="result">
                    </div>
                    <div class="px-2 py-1.5">
                        <p class="text-[10px] text-gray-500 truncate">${item.name}</p>
                        <p class="text-[10px] text-gray-400">${tw}×${th} · ${formatBytes(blob.size)}</p>
                        <button onclick="downloadSingle(${globalIdx},'${baseName}_${tw}x${th}.jpg')" class="w-full mt-1 px-2 py-1 bg-primary/10 text-primary rounded-lg text-[10px] font-medium hover:bg-primary/20 transition-colors">下载</button>
                    </div>
                </div>`;
        });
        html += `</div>`;

        if (results.length > 1) {
            html += `<button onclick="downloadAll()" class="w-full px-4 py-2 bg-gradient-to-r from-primary to-primary-dark text-white rounded-xl text-xs font-medium hover:shadow-lg hover:shadow-primary/25 transition-all flex items-center justify-center gap-1.5">
                <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                全部下载
            </button>`;
        }

        html += `<p class="text-xs text-gray-400 mt-3">💡 可以继续上传新图片</p>`;
        addBotHTML(html);
    }

    // ============ Mode ============
    function setMode(mode) {
        state.mode = mode;
        document.querySelectorAll('.mode-btn').forEach(el => {
            if (el.dataset.mode === mode) {
                el.className = 'mode-btn text-xs px-3 py-1.5 rounded-full border border-gray-200 bg-primary text-white font-medium';
            } else {
                el.className = 'mode-btn text-xs px-3 py-1.5 rounded-full border border-gray-200 text-gray-600 font-medium hover:border-primary hover:text-primary';
            }
        });
    }

    // ============ Downloads ============
    function downloadSingle(index, filename) {
        const item = state.images[index];
        if (!item || !item.resultUrl) return;
        const a = document.createElement('a');
        a.href = item.resultUrl;
        a.download = filename;
        a.click();
    }

    function downloadAll() {
        if (state.images.length === 0) return;
        state.images.forEach((item, index) => {
            if (!item.resultUrl) return;
            const baseName = item.name.replace(/\.[^.]+$/, '');
            const size = state.currentSizeKey ? platforms[state.currentPlatform]?.sizes[state.currentSizeKey] : null;
            const tw = size ? size.width : 800;
            const th = size ? (size.height || Math.round(item.img.height * (tw / item.img.width))) : 800;
            setTimeout(() => downloadSingle(index, `${baseName}_${tw}x${th}.jpg`), index * 200);
        });
    }

    // ============ Utilities ============
    function formatBytes(bytes) {
        if (bytes < 1024) return bytes + ' B';
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
        return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    // ============ Start ============
    init();
    </script>

    <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
    </script>
<script>
(function(){
  let deferredPrompt;
  const installBtn = document.getElementById('pwa-install-btn');
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    if (installBtn) installBtn.style.display = 'flex';
  });
  if (installBtn) {
    installBtn.addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      if (outcome === 'accepted') {
        installBtn.style.display = 'none';
      }
      deferredPrompt = null;
    });
  }
  if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone) {
    if (installBtn) installBtn.style.display = 'none';
  }
})();
</script>
</body>
</html>
